<script type="text/javascript">
var tabClienti;
$(document).ready(function() {

    moment.locale('it');

    Waves.attach('.btn', ['waves-float']);
    Waves.init();
    new WOW().init();

    tabClienti = $('#tabClienti').DataTable({
		"createdRow": function(row, data, dataIndex) {
				$(row).addClass("rowPointer");
			},
		"language": {url: 'https://cdn.datatables.net/plug-ins/1.10.12/i18n/Italian.json'},
		"scrollX": false,
        "columnDefs" : [{
			"searchable": false,
			"orderable": false, 
			"targets" : [4],
            "visible": false
		}],
        order: [[0, 'asc']]
	});
    $('#tabClienti tbody').on('click', 'tr', function (evt) {
    	var cell=$(evt.target).closest('td').index();
        if(cell>0){
			dettagliClifo(tabClienti.cell(this,4).data());
        }
    } );

    refreshClifo();

});



function refreshClifo() {
  var elencoClifo = $.getJSON(server + 'secure/cliforapido/elencopme');

  elencoClifo.success(function(response) {
    tabClienti.clear();
    $('#elencoClifo').html('');
    for (i = 0; i < response.length; i++) {
      $('#elencoClifo').append('<tr class="wow fadeInUp" onclick="dettagliClifo(' + response[i].id + ')" style="cursor: pointer; cursor: hand"><td>' + response[i].societa + '</td><td>' + response[i].citta + '</td><td>' + response[i].referente + '</td><td>' + response[i].tipoClifo + '</td></tr>');
      var newRow;
      newRow = tabClienti.row.add( [
        response[i].societa,
        response[i].citta,
        response[i].referente,
        response[i].tipoClifo,
        response[i].id
      ] ).draw();
    }
  });
}


function textAreaAdjust(o) {
    autosize(o);
}
var animationEnd = 'webkitAnimationEnd mozAnimationEnd MSAnimationEnd oanimationend animationend';

function elencoClifo() {

  $('.mascheraClifo').hide();
  $('.elencoClifo').show().addClass('animated slideInLeft').one(animationEnd, function() {
    $(this).removeClass('animated slideInLeft');
  });
  $('.boxGenerali').hide();
  $('.boxFornitori').hide();
}

function dettagliGenerali() {
  $('.boxFornitori').hide();
  $('.boxGenerali').show().addClass('animated bounceInDown').one(animationEnd, function() {
    $(this).removeClass('animated bounceInDown');
  });
}

function dettagliClifo(id) {
  _idClifo = id;
  var richiestaClifo = $.getJSON(server + 'secure/cliforapido/readByKey?idClifo=' + id);

/**
 * Salva o aggiorna un CliFo.
 * – _idClifo = -1   inserimento
 * – _idClifo >= 0   modifica
 */
function salvaCli() {
    var tipo = $("#idTipoClifo").val();
    if(_idClifo<0){
      tipo = $("#idTipoClifo2").val();
    }
    const societa = $('#societa').val().trim();
    if (!societa) {
        $('#erroreSocieta').show();
        return;
    }
    $('#erroreSocieta').hide();

    //se cliente, verifica campi obbligatori
    if (tipo == 'CLIENTE') {
        const piva       = $('#piva').val();
        const pec        = $('#pec').val();
        const telematico = $('#telematico').val();
        const via        = $('#indirizzo').val();
        const citta      = $('#citta').val();
        const cap        = $('#cap').val();
        const provincia  = $('#provincia').val();

        if (!piva) {
            swal("Errore", "Partita IVA obbligatoria per i CLIENTI", "warning");
            return;
        }
        if (!pec && !telematico) {
            swal("Errore", "Inserire almeno PEC o Indirizzo Telematico", "warning");
            return;
        }
        if (!via || !citta || !cap || !provincia) {
            swal("Errore",
                 "Compilare l'indirizzo completo: via, città, CAP e provincia",
                 "warning");
            return;
        }
    }

    const data = {
      id: _idClifo,
      tipoCliFo: tipo,
      societa: societa,
      via: $('#indirizzo').val(),
      cap: $('#cap').val(),
      citta: $('#citta').val(),
      provincia: $('#provincia').val(),
      nazione: $('#nazione').val(),
      titoloC: $('#titoloC').val(),
      nomeC: $('#nomeC').val(),
      cognomeC: $('#cognomeC').val(),
      cellulareC: $('#cellulareC').val(),
      emailC: $('#emailC').val(),
      telefono: $('#telefono').val(),
      fax: $('#fax').val(),
      noteInterne: $('#noteInterne').val(),
      pec:         $('#pec').val(),
      telematico:  $('#telematico').val(),
      piva:        $('#piva').val(),
      cfisc:       $('#cfisc').val()

    };


    $.ajax({
        url: server + 'secure/cliforapido/update',
        type: 'POST',
        contentType: 'application/json',
        headers: { 
          'Authorization': 'Bearer ' + localStorage.getItem('jwt') 
        },
        data: JSON.stringify(data),

        success: function () {
            noty({
                text:   (_idClifo<0) 
                  ? tipo + ' inserito con successo'
                  : 'Modifiche salvate con successo',
                layout: 'topCenter',
                type:   'success',
                killer: true,
                timeout: 2000,
                animation: {
                    open:  'animated bounceInDown',
                    close: 'animated bounceOutUp',
                    speed: 500
                }
            });
            $("#btnOpenUpd").show();
            $('#btnEliminaCli').show();
            $("#btnSaveUpd").hide();
            $("#btnCancelUpd").hide();
            refreshClifo();
            if(_idClifo>=0){
              dettagliClifo(_idClifo);
            }
        },

        error: function (xhr) {
            swal("Errore", "Errore nel salvataggio", "error");
        }
    });

}



function eliminaCli() {
    swal({
        title: "",
        text: "L’operazione eliminerà definitivamente questa anagrafica dall’archivio. Si prega di confermare.",
        type: "warning",
        showCancelButton: true,
        confirmButtonColor: "#d9534f",
        confirmButtonText: "Sì, elimina",
        cancelButtonText: "Annulla",
        closeOnConfirm: true,
        allowEscapeKey: false,
        allowOutsideClick: false
    }, function (isConfirm) {
        if (!isConfirm) return;

        $.ajax({
            url: server + 'secure/cliforapido/elimina',
            type: 'POST',
            data: JSON.stringify({ id: _idClifo }),
            contentType: 'application/json',
            success: function () {
              noty({
                text:   'Anagrafica rimossa correttamente.',
                layout: 'topCenter',
                type:   'success',
                killer: true,
                timeout: 2000,
                animation: {
                    open:  'animated bounceInDown',
                    close: 'animated bounceOutUp',
                    speed: 500
                }
              });
              refreshClifo();
              elencoClifo();
            },
            error: function (r) {
                var msg = "Errore generico.";
                try { msg = JSON.parse(r.responseText).ERROR || msg; } catch (e) {}
                swal({
                    title: "Errore",
                    text: msg,
                    type: "error",
                    allowEscapeKey: false,
                    allowOutsideClick: false
                });
            }
        });
    });
}
