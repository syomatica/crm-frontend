<script>

var colReg = [{
    data: 'importo',
    type: 'numeric',
    format: '$ 0,0.00',
    language: 'it'
}, {
    data: 'data',
    type: 'date',
    dateFormat: 'DD-MM-YYYY',
    correctFormat: true,
    allowInvalid: false,
    allowEmpty: true,
    validator: function(value, callback) {
        if (value === null || value === '') {
        callback(true);
        return;
        }
        var isValid = isValidDateDDMMYYYY(value);
        callback(isValid);
    }
}, {
    data: 'buttons',
    renderer: function(instance, td, row, col, prop, value, cellProperties) {
        td.innerHTML = '';
        td.className = 'htCenter htMiddle';

        if (row > 0) {
            td.innerHTML =
                '<button class="btn btn-danger btn-xs btn-block btn-flat waves-effect waves-float delScadenza" ' +
                'data-row="' + row + '" ' +
                'style="width: 22px; height:22px; border-radius:3px">' +
                '<i class="fa fa-minus"></i></button>';
        }
    },
    readOnly: true
}];

function isValidDateDDMMYYYY(dateStr) {
    if (typeof dateStr !== 'string') return false;

    var parts = dateStr.split("-");
    if (parts.length !== 3) return false;

    var [day, month, year] = parts.map(p => parseInt(p, 10));

    if (
        isNaN(day) || isNaN(month) || isNaN(year) ||
        day < 1 || month < 1 || month > 12 || year < 1000
    ) {
        return false;
    }

    var date = new Date(year, month - 1, day);
    return (
        date.getFullYear() === year &&
        date.getMonth() === month - 1 &&
        date.getDate() === day
    );
}

function popolaCombo(){
	
	var r = JSON.parse(sessionStorage.getItem('comboRegistrazione'));

    //FORNITORI
    var select = '';
    fornitori = r.fornitori;
    fornitori.sort(function(a, b) {
        //ascending
        if (a.societa < b.societa) return -1;
        if (a.societa > b.societa) return 1;
        return 0;
    });

    var length = fornitori.length;
    select += '<option value="0">(Non specificato)</option>';
    for (i = 0; i < length; i++)
        select += '<option value="' + fornitori[i].id + '">' + fornitori[i].societa + '</option>';
    $('#fornitoreDocumento').empty().append(select);

    //CENTRI DI COSTO
    select = '';
    var ccosto = r.ccosto;
    ccosto.sort(function(a, b) {
        //ascending
        if (a.codice < b.codice) return -1;
        if (a.codice > b.codice) return 1;
        return 0;
    });

    length = ccosto.length;
    for (i = 0; i < length; i++)
        select += '<option value="' + ccosto[i].id + '">' + ccosto[i].codice + ' - ' + ccosto[i].descrizione + '</option>';
    select += '<option value="">(Non specificato)</option>';
    $('#ccostoDocumento').empty().append(select);

    //TIPI
    $('#filtroTipo').html(null);
    var tipi = r.tipi;
    length = tipi.length;
    for (i = 0; i < length; i++){
        $('#filtroTipo').append('<option value="' + tipi[i].idTipo + '">' + tipi[i].tipoPreventivo + '</option>');
    }
    $('#filtroTipo').trigger('change');

function toLoadRigaTabella(idDoc, jRiga){

	
	var newRow;
    newRow = tabella.row.add( [
		jRiga.TipoDoc,
        moment(jRiga.DataDoc).format('DD MMM YY'),
        jRiga.NumeroDoc,
        getFornitore(jRiga.clifoID),
        numeral(jRiga.Imponibile).format('$ 0,0.00'),
        jRiga.Iva>0?numeral(jRiga.Iva).format('$ 0,0.00'):'-',
        jRiga.Ritenuta>0?numeral(jRiga.Ritenuta).format('$ 0,0.00'):'-',
        jRiga.previsionale?'-':numeral((jRiga.TotalePagare - jRiga.ImportoPagato)).format('$ 0,0.00'),
        getCommessa(jRiga.preventivoID),
        jRiga.allegatoID?"<span class='glyphicon glyphicon-check' style='color:grey'></span>":"",
        jRiga.previsionale?'<button class="btn btn-warning btn-xs">Previsionale</button>':'',
        idDoc,

	//] ).draw();
    ] );

    var loadableRow = {
        "idDoc" : idDoc,
        "jRiga" : jRiga,
        "index" : newRow.index()			
    }

    rowsToLoad.push(loadableRow);

    
}

function toFillRigaTabella(index,jsonCommessa) { 

    //verifica congruenza SAL
    //tutti gli importi dei Sal devono essere il 100% del totale commessa
    var totaleSal = (jsonCommessa.sal1 ?? 0.0) + (jsonCommessa.sal2 ?? 0.0) + (jsonCommessa.sal3 ?? 0.0) + (jsonCommessa.sal4 ?? 0.0) + (jsonCommessa.sal5 ?? 0.0) + (jsonCommessa.sal6 ?? 0.0) + (jsonCommessa.sal7 ?? 0.0);
    if(totaleSal<jsonCommessa.TotalePreventivo){
        tabella.cell( index, 0 ).data('<span style="color:red;">'+getPercentuale(jsonCommessa.TotalePreventivo,totaleSal)+'</span>');
    }else{
        tabella.cell( index, 0 ).data('<span class="glyphicon glyphicon-check" style="color:green;"></span>');
    }

    //verifica se la commessa è completamente fatturata
    var totaleFatturato = (((jsonCommessa.sal1 ?? 0.0)>0 && jsonCommessa.fatt1)?jsonCommessa.sal1:0.0) + (((jsonCommessa.sal2 ?? 0.0)>0 && jsonCommessa.fatt2)?jsonCommessa.sal2:0.0) + (((jsonCommessa.sal3 ?? 0.0)>0 && jsonCommessa.fatt3)?jsonCommessa.sal3:0.0) + (((jsonCommessa.sal4 ?? 0.0)>0 && jsonCommessa.fatt4)?jsonCommessa.sal4:0.0) + (((jsonCommessa.sal5 ?? 0.0)>0 && jsonCommessa.fatt5)?jsonCommessa.sal5:0.0) + (((jsonCommessa.sal6 ?? 0.0)>0 && jsonCommessa.fatt6)?jsonCommessa.sal6:0.0) + (((jsonCommessa.sal7 ?? 0.0)>0 && jsonCommessa.fatt7)?jsonCommessa.sal7:0.0);
    if(totaleFatturato<jsonCommessa.TotalePreventivo){
        var domcell = tabella.cell( index, 1 ).node();
        $(domcell).css({"color":"darkred"});
    }

}

    function calcolaImporti() {
        var totaleImponibile = parseMoney($('#imponibileDocumento').val());
        var totaleIva = parseMoney($('#iva4Documento').val()) + parseMoney($('#iva5Documento').val()) + parseMoney($('#iva10Documento').val()) + parseMoney($('#iva22Documento').val());
        var ritenutaAcconto = parseMoney($('#raccDocumento').val());
        $('#ivaDocumento').val(numeral(totaleIva).format('$ 0,0.00'));

        totaleNetto = totaleImponibile * 1.0;
        var tipodoc = $('#tipoDocumento').val();
        if(tipodoc=='Fattura'){
            totaleNetto = totaleNetto + totaleIva - ritenutaAcconto;
        }
        if(tipodoc=='Ricevuta'){
            totaleNetto = totaleNetto - ritenutaAcconto;
        }
        $('#pagareDocumento').val(numeral(totaleNetto).format('$ 0,0.00'));

        if(grigliaReg.getSourceData().length == 1){
            var oldData = grigliaReg.getSourceData()[0].data;
            dataReg = [
                { importo: totaleNetto, data: oldData, buttons: 1}
            ];
            tabReg = {
                data: dataReg,
                columns: colReg,

                    "Scadenza",

                ],

                stretchH: 'all',

                stretchH: 'none',
                manualColumnResize: true,
                contextMenu: false,
                readOnly: (tipoSalva=='VIS'),
                minRows: righeScadenze,
                cells: function(row, col) {
                    return {
                        className: 'htCenter htMiddle custom-cell-style'
                    };
                }
            };
            try {
                grigliaReg.destroy();
            } catch (err) {}
            grigliaReg = new Handsontable(document.getElementById('grigliaReg'), tabReg);
        }
    }
    function parseMoney(val) {
        if(val!=null){
            val = val.replace(/€/g, '')
                .replace(/\s/g, '')
                .replace(/\./g, '')
                .replace(',', '.');
            return parseFloat(val) || 0;
        }
        return 0;
        
    }

        });
        $('#grigliaReg').on('click', '.delScadenza', function () {
            if(tipoSalva!="VIS"){
                var rowIndex = $(this).data('row');
                grigliaReg.alter('remove_row', rowIndex);
                righeScadenze = grigliaReg.countRows();
            }
        });
    }

    $("#pdfInput").val("");
    $('#fornitoreDocumento').val("0").trigger('change');
    $('#ccostoDocumento').val("").trigger('change');
    $('#tipoDocumento').val("").trigger('change');
    $("#previsionaleDocumento").prop("checked", false);
    $('#commessaDocumento').val("").trigger('change');
    $('#dataDocumento').val(formattedOggi);
    $('#numeroDocumento').val("");
    $('.money').val(numeral(0).format('$ 0,0.00')).trigger("change");
    $('#previsionaleFornitore').empty();
    $('#daricevereFornitore').empty();

    //griglia pagamenti
    dataReg = [
        { importo: 0, data: formattedScadenza, buttons: 1}
    ];
    tabReg = {
        data: dataReg,
        columns: colReg,
        rowHeaders: true,
        colHeaders: [
            "Importo",
            "Scadenza",
            '<button id="addScadenza" class="btn btn-primary btn-xs btn-block btn-flat waves-effect waves-float" style="width: 100%"><i class="fa fa-plus"></i></button>'
        ],
        colWidths: [135,135,30],
        fillHandle: false,
        stretchH: 'all',
        height: 100,
        stretchH: 'none',
        manualColumnResize: true,
        contextMenu: false,
        minRows: righeScadenze,
        cells: function(row, col) {
            return {
                className: 'htCenter htMiddle custom-cell-style'
            };
        }
    };
    try {
        grigliaReg.destroy();
    } catch (err) {}
    grigliaReg = new Handsontable(document.getElementById('grigliaReg'), tabReg);

    $('.deleteRModal').hide();
    $('.allegatoRModal').hide();
    $("#tipoDocumento, #fornitoreDocumento, #dataDocumento, #numeroDocumento, #commessaDocumento, #ccostoDocumento, #imponibileDocumento, #iva4Documento, #iva5Documento, #iva4Documento, #iva22Documento, #raccDocumento, #previsionaleDocumento").prop("disabled",false);
    $(".riconciliaFornitore").hide();
    //CARICAMENTO DATI QUANDO idReg >= 0
    if(idReg>=0){
        //legge documento
        $.ajax({
            url: server + "secure/coge/docpassivofull/" + idReg,
            method: 'GET',
            success: function (dati) {
                if(dati!=null){
                    $(".riconciliaFornitore").hide();
                    tipoSalva = "UPD";
                    reg_doc = JSON.parse(dati.documento);
                    reg_scad = JSON.parse(dati.scadenze);

                    if(reg_doc.importoPagato!=0 && !reg_doc.previsionale){
                        tipoSalva = "VIS";
                    }

                    $('#tipoDocumento').val(reg_doc.tipoDoc).trigger("change");
                    $('#tipoDocumento').prop("disabled",true);

                    $('#fornitoreDocumento').val(reg_doc.clifoId).trigger("change");
                    $('#fornitoreDocumento').prop("disabled",true);

                    if(reg_doc.previsionale){
                        $("#previsionaleDocumento").prop("checked", true);
                    }else{
                        $("#previsionaleDocumento").prop("checked", false);
                    }
                    $('#previsionaleDocumento').prop("disabled",true);

                    oggi.setFullYear(reg_doc.dataDoc.year,(reg_doc.dataDoc.monthValue - 1),reg_doc.dataDoc.dayOfMonth);
                    formattedOggi = `${oggi.getFullYear()}-${String(oggi.getMonth() + 1).padStart(2, '0')}-${String(oggi.getDate()).padStart(2, '0')}`;
                    $('#dataDocumento').val(formattedOggi);
                    $('#numeroDocumento').val(reg_doc.numeroDoc);
                    if(reg_doc.preventivoId!=null){
                        $('#commessaDocumento').val(reg_doc.preventivoId).trigger('change');
                    }else{
                        $('#commessaDocumento').val("").trigger('change');
                    }
                    if(reg_doc.ccostoId!=null){
                        $('#ccostoDocumento').val(reg_doc.ccostoId).trigger('change');
                    }else{
                        $('#ccostoDocumento').val("").trigger('change');
                    }
                    $('#imponibileDocumento').val((reg_doc.imponibile+"").replace(".",",")).trigger('blur');
                    $('#iva4Documento').val((reg_doc.iva4+"").replace(".",",")).trigger('blur');
                    $('#iva5Documento').val((reg_doc.iva5+"").replace(".",",")).trigger('blur');
                    $('#iva10Documento').val((reg_doc.iva10+"").replace(".",",")).trigger('blur');
                    $('#iva22Documento').val((reg_doc.iva22+"").replace(".",",")).trigger('blur');
                    $('#raccDocumento').val((reg_doc.ritenuta+"").replace(".",",")).trigger('blur');

                    dataReg = [];
                    righeScadenze = reg_scad.length;
                    if(reg_scad.length>0){
                        for(var ii=0;ii<reg_scad.length;ii++){
                            var riga_scad = reg_scad[ii];
                            var datatmp = new Date();
                            datatmp.setFullYear(riga_scad.dataScadenza.year,(riga_scad.dataScadenza.monthValue - 1),riga_scad.dataScadenza.dayOfMonth);
                            var formatotmp = `${String(datatmp.getDate()).padStart(2, '0')}-${String(datatmp.getMonth() + 1).padStart(2, '0')}-${datatmp.getFullYear()}`;
                            dataReg.push({importo: (riga_scad.importoScadenza+"").replace(".",","), data: formatotmp, buttons: 1})
                        }
                    }
                    tabReg = {
                        data: dataReg,
                        columns: colReg,
                        rowHeaders: true,
                        colHeaders: [
                            "Importo",
                            "Scadenza",
                            '<button id="addScadenza" class="btn btn-primary btn-xs btn-block btn-flat waves-effect waves-float" style="width: 100%"><i class="fa fa-plus"></i></button>'
                        ],
                        colWidths: [135,135,30],
                        fillHandle: false,
                        stretchH: 'all',
                        height: 100,
                        stretchH: 'none',
                        manualColumnResize: true,
                        contextMenu: false,
                        readOnly: (tipoSalva=='VIS'),
                        minRows: righeScadenze,
                        cells: function(row, col) {
                            return {
                                className: 'htCenter htMiddle custom-cell-style'
                            };
                        }
                    };
                    try {
                        grigliaReg.destroy();
                    } catch (err) {}
                    grigliaReg = new Handsontable(document.getElementById('grigliaReg'), tabReg);

                    calcolaImporti();
                    
                    
                    if (reg_doc.allegatoId!=null) {
                        const token = sessionStorage.getItem('token');
                        const url = server + 'documenti/allegato/'+reg_doc.allegatoId;
                        
                        var data = {
                            id: idReg,
                            token: encodeURI(token),
                            fileName: reg_doc.allegatoId + '.pdf',
                            file: url
                        }
                        $('#pdfPreview').attr('src', '../assets/viewer.html?' + $.param(data));
                    }

                    if(tipoSalva=="VIS"){
                        //disabilita tutti i campi - tranne l'allegato
                        $("#tipoDocumento, #fornitoreDocumento, #dataDocumento, #numeroDocumento, #commessaDocumento, #ccostoDocumento, #imponibileDocumento, #iva4Documento, #iva5Documento, #iva4Documento, #iva22Documento, #raccDocumento, #previsionaleDocumento").prop("disabled",true);
                    }

                    if(tipoSalva=='UPD'){
                        $('.deleteRModal').show();
                    }

                }else{
                    alert('Errore nel caricamento del documento');
                    $('#rModal').hide();
                    $('#pdfPreview').attr('src', '');
                    $('body').removeClass('modal-open');
                }
            },
            error: function () {
                alert('Errore nel caricamento del documento');
                $('#rModal').hide();
                $('#pdfPreview').attr('src', '');
                $('body').removeClass('modal-open');
            }
        });
    }

    $('#rModal').show();
    $('body').addClass('modal-open');

}

function formattaDataDaSQLMMMYY(dataObj) {
    if (!dataObj || typeof dataObj !== 'object') return null;
    return moment([dataObj.year, dataObj.monthValue - 1, dataObj.dayOfMonth]).format('MMMM YY');
}

function getFornitore(id) {
    if(id!=null){
        for(var i=0;i<fornitori.length;i++){
            if(fornitori[i].id==id){
                return fornitori[i].societa;
            }
        }
    }
    return "-";
}

function getCommessa(id) {
    if(id!=null){
        for(var i=0;i<commesse.length;i++){
            if(commesse[i].IDpreventivo==id){
                var toreturn = "";
                var tosplit = commesse[i].Code.split("_");
                if(tosplit.length>=3){
                    toreturn += tosplit[0]+"_"+tosplit[1]+"_"+tosplit[2];
                } 
                if(tosplit.length>=4){
                    toreturn += "\n"+tosplit[3].replaceAll(" ","_");
                }
                if(tosplit.length>=5){
                    toreturn += "\n"+tosplit[4];
                }
                if(tosplit.length>=6){
                    toreturn += "_"+tosplit[5];
                }
                return toreturn;
            }
        }
    }
    return "-";
}

function loadParametroTarget() {
    $.getJSON(server + 'secure/parametri/getByParametro', { parametro: 'contabilita.target.mese' }, function (obj) {
        if (!obj || !obj.valore || obj.valore === "") {
            targetMensile = 0.0;
        } else {
            targetMensile = obj.valore * 1;
        }
    })
}
