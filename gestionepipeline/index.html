    <body class="skin-blue sidebar-mini">
        <div class="wrapper">
            <header id="theheader" class="main-header"></header>
            <script language="javascript">
                if(!(sessionStorage.getItem("pme")==='true')){
                    $.get("../templates/header.mst?_"+(new Date()).getTime(), function (template) {
                        $('#theheader').html(Mustache.render(template, {}));
                    });
                }
            </script>

            <aside id="themenu" class="main-sidebar"></aside>
            <script>
                window.__MENU_ACTIVE__ = { pprev: true };  
            </script>
            <script src="../menu-loader.js"></script>


            <div class="content-wrapper">
                <section class="content-header">
                    <h1>Pipeline Offerte <small>Dashboard trimestrale</small></h1>
                </section>

                <section class="content">

                    <!-- FILTRI -->
                    <div class="box box-primary">
                    <div class="box-header with-border">
                        <h3 class="box-title">Filtri</h3>
                        <div class="box-tools pull-right">
                        <button class="btn btn-box-tool" data-widget="collapse"><i class="fa fa-minus"></i></button>
                        </div>
                    </div>
                    <div class="box-body">
                        <div class="row">

                        <div class="col-md-3">
                            <label>Periodo</label>
                            <select id="fQuarter" class="form-control"></select>
                        </div>

                        <div class="col-md-3">
                            <label>Vista</label>
                            <select id="fView" class="form-control">
                            <option value="total">Totale</option>
                            <option value="agent">Per agente</option>
                            <option value="partner">Per partner</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label>Agenti</label>
                            <select id="fAgents" class="form-control" multiple></select>
                        </div>

                        <div class="col-md-3">
                            <label>Partner</label>
                            <select id="fPartners" class="form-control" multiple></select>
                        </div>

                        </div>

                        <div class="row" style="margin-top:10px;">
                        <div class="col-md-3">
                            <label>Cliente</label>
                            <select id="fCustomerType" class="form-control">
                            <option value="">Tutti</option>
                            <option value="PROSPECT">Prospect</option>
                            <option value="ACQUIRED">Cliente acquisito</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label>Stato offerta</label>
                            <select id="fStatus" class="form-control">
                            <option value="">Tutte</option>
                            <option value="OPEN">Aperte</option>
                            <option value="WON">Vinte</option>
                            <option value="LOST">Perse</option>
                            <option value="EXPIRED">Scadute</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label>Probabilità min</label>
                            <input id="fMinProb" type="number" class="form-control" min="0" max="100" value="0">
                        </div>

                        <div class="col-md-3" style="padding-top:24px;">
                            <button id="btnApply" class="btn btn-primary btn-flat"><i class="fa fa-refresh"></i> Applica</button>
                            <button id="btnReset" class="btn btn-default btn-flat">Reset</button>
                        </div>
                        </div>
                    </div>
                    </div>

                    <!-- KPI WIDGETS -->
                    <div class="row" id="kpiRow">
                    <div class="col-md-3">
                        <div class="small-box bg-aqua">
                        <div class="inner">
                            <h3 id="kpiWeighted">-</h3>
                            <p>Pipeline (pesata)</p>
                        </div>
                        <div class="icon"><i class="fa fa-line-chart"></i></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="small-box bg-blue">
                        <div class="inner">
                            <h3 id="kpiUnweighted">-</h3>
                            <p>Pipeline (totale)</p>
                        </div>
                        <div class="icon"><i class="fa fa-eur"></i></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="small-box bg-green">
                        <div class="inner">
                            <h3 id="kpiWon">-</h3>
                            <p>Vinto nel trimestre</p>
                        </div>
                        <div class="icon"><i class="fa fa-trophy"></i></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="small-box bg-yellow">
                        <div class="inner">
                            <h3 id="kpiWinRate">-</h3>
                            <p>Win rate</p>
                        </div>
                        <div class="icon"><i class="fa fa-percent"></i></div>
                        </div>
                    </div>
                    </div>

                    <!-- GRAFICI -->
                    <div class="row">

                    <div class="col-md-6">
                        <div class="box box-info">
                        <div class="box-header with-border">
                            <h3 class="box-title">Pipeline per fase</h3>
                        </div>
                        <div class="box-body">
                            <canvas id="chartStage" height="160"></canvas>
                        </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="box box-info">
                        <div class="box-header with-border">
                            <h3 class="box-title">Trend trimestrale</h3>
                        </div>
                        <div class="box-body">
                            <canvas id="chartTrend" height="160"></canvas>
                        </div>
                        </div>
                    </div>

                    </div>

                    <!-- LISTE -->
                    <div class="row">

                    <div class="col-md-7">
                        <div class="box box-default">
                        <div class="box-header with-border">
                            <h3 class="box-title">Top offerte aperte</h3>
                        </div>
                        <div class="box-body table-responsive no-padding">
                            <table class="table table-hover" id="tblOpen">
                            <thead>
                                <tr>
                                <th>Cliente</th><th>Tipo</th><th>Agente</th><th>Partner</th>
                                <th class="text-right">Importo</th><th class="text-right">Prob.</th><th class="text-right">Pesato</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                            </table>
                        </div>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="box box-default">
                        <div class="box-header with-border">
                            <h3 class="box-title">Top (Agenti / Partner)</h3>
                        </div>
                        <div class="box-body table-responsive no-padding">
                            <table class="table table-hover" id="tblTop">
                            <thead>
                                <tr><th>Nome</th><th class="text-right">Pipeline pesata</th><th class="text-right">Vinto</th></tr>
                            </thead>
                            <tbody></tbody>
                            </table>
                        </div>
                        </div>
                    </div>

                    </div>

                </section>
            </div>


            <footer id="thefooter"></footer>
            <script language="javascript">
                if(!(sessionStorage.getItem("pme")==='true')){

                        $('#thefooter').html(Mustache.render(template, {vv:sessionStorage['vv']}));
                        $("#thefooter").addClass("main-footer")
                    });
