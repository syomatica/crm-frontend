}, {

    dateFormat: 'DD-MM-YYYY',
    correctFormat: true,
    allowInvalid: false,
    allowEmpty: true,
    validator: function(value, callback) {
        if (value === null || value === '') {
        callback(true);
        return;
        }
        var isValid = isValidDateDDMMYYYY(value);
        callback(isValid);
    }
}, {
    data: 'buttons',
    renderer: function(instance, td, row, col, prop, value, cellProperties) {
        td.innerHTML = '';
        td.className = 'htCenter htMiddle';

        if (row > 0) {
            td.innerHTML =
                '<button class="btn btn-danger btn-xs btn-block btn-flat waves-effect waves-float delScadenza" ' +
                'data-row="' + row + '" ' +
                'style="width: 22px; height:22px; border-radius:3px">' +
                '<i class="fa fa-minus"></i></button>';
        }
    },
    readOnly: true
}];

function isValidDateDDMMYYYY(dateStr) {
    if (typeof dateStr !== 'string') return false;

    var parts = dateStr.split("-");
    if (parts.length !== 3) return false;

    var [day, month, year] = parts.map(p => parseInt(p, 10));

    if (
        isNaN(day) || isNaN(month) || isNaN(year) ||
        day < 1 || month < 1 || month > 12 || year < 1000
    ) {
        return false;
    }

    var date = new Date(year, month - 1, day);
    return (
        date.getFullYear() === year &&
        date.getMonth() === month - 1 &&
        date.getDate() === day
    );
}

var rowsToLoad = [];

function refreshElenco() {

	Pace.restart();
	Pace.track(function () {
        var elencoCall = $.getJSON(server + 'secure/coge/fattureall');
        elencoCall.success(function (responseJson) {
            tabFatture.clear().draw();
            rowsToLoad = [];

            var response = responseJson.map( function(res) {
                return res;
            });

            rawData = response;

            var elencoLength = response.length;

            //carica riga tabella con i dati dell'elenco commesse letto
            for (i = 0; i < elencoLength; i++){
                toLoadRigaTabella(response[i].id, response[i]);
            }
            tabFatture.draw();

function toLoadRigaTabella(idDoc, jRiga){

	var newRow;
    newRow = tabFatture.row.add( [

        moment(jRiga.dataFattura).format('DD MMM YY'),
        jRiga.numeroFattura,
        jRiga.alias!=''?jRiga.alias:jRiga.cliente,
        numeral(jRiga.imponibile).format('$ 0,0.00'),
        jRiga.iva>0?numeral(jRiga.iva).format('$ 0,0.00'):'-',
        jRiga.ritenuta>0?numeral(jRiga.ritenuta).format('$ 0,0.00'):'-',
        numeral(jRiga.totalePagare).format('$ 0,0.00'),
        jRiga.commessa,
        jRiga.allegatoId?"<span class='glyphicon glyphicon-check' style='color:grey'></span>":"",
        numeral(jRiga.importoPagato).format('$ 0,0.00'),

	//] ).draw();
    ] );

    var loadableRow = {
        "idDoc" : idDoc,
        "jRiga" : jRiga,
        "index" : newRow.index()
    }

    rowsToLoad.push(loadableRow);


}

  function exportToXls() {
        var clifoIds = [];
        rawData.forEach(function(r) {
            if (r.clifoId && clifoIds.indexOf(r.clifoId) === -1) {
                clifoIds.push(r.clifoId);
            }
        });

        if (clifoIds.length === 0) {
            generaExcel({});
            return;
        }

        var clifoMap = {};
        var loaded = 0;

        clifoIds.forEach(function(id) {
    $.getJSON(server + 'secure/cliforapido/readByKey?idClifo=' + id)
        .done(function(data) {
            var c = Array.isArray(data) ? data[0] : data;
            var parti = [];
            if (c.societa)    parti.push(c.societa.trim());
            if (c.piva)       parti.push('P.IVA: ' + c.piva.trim());
            if (c.cf)         parti.push('C.F: ' + c.cf.trim());
            if (c.via)        parti.push(c.via.trim());
            if (c.cap)        parti.push(c.cap.trim() + ' - ' + (c.citta ? c.citta.trim() : '') + (c.provincia ? ' (' + c.provincia.trim() + ')' : '') + ' - ' + (c.nazione ? c.nazione.trim() : ''));
            if (c.telematico) parti.push('Codice destinatario: ' + c.telematico.trim());
            clifoMap[id] = parti.join(' | ');
        })
        .always(function() {
            loaded++;
            if (loaded === clifoIds.length) {
                generaExcel(clifoMap);
            }
        });
});

    }

 function generaExcel(clifoMap) {
    var headers = [
        'CORRI','M_2','IMPIVA','IVA','TOTFAT','IMPRDA','RDA','SPLIT','PAGARE',
        'N.','DATA','INDIRIZZO','OGGETTO','Totale pagato'
    ];

    var thStyle = {
        font: { bold: true },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: {
            top:    { style: 'thin', color: { rgb: '000000' } },
            bottom: { style: 'thin', color: { rgb: '000000' } },
            left:   { style: 'thin', color: { rgb: '000000' } },
            right:  { style: 'thin', color: { rgb: '000000' } }
        }
    };

    var numStyle = {
        numFmt: '#,##0.00',
        alignment: { horizontal: 'left', vertical: 'top' },
        border: {
            top:    { style: 'thin', color: { rgb: 'CCCCCC' } },
            bottom: { style: 'thin', color: { rgb: 'CCCCCC' } },
            left:   { style: 'thin', color: { rgb: 'CCCCCC' } },
            right:  { style: 'thin', color: { rgb: 'CCCCCC' } }
        }
    };

    var txtStyle = {
        alignment: { horizontal: 'left', vertical: 'top' },
        border: {
            top:    { style: 'thin', color: { rgb: 'CCCCCC' } },
            bottom: { style: 'thin', color: { rgb: 'CCCCCC' } },
            left:   { style: 'thin', color: { rgb: 'CCCCCC' } },
            right:  { style: 'thin', color: { rgb: 'CCCCCC' } }
        }
    };

    var wrapStyle = {
        alignment: { horizontal: 'left', vertical: 'top', wrapText: true },
        border: {
            top:    { style: 'thin', color: { rgb: 'CCCCCC' } },
            bottom: { style: 'thin', color: { rgb: 'CCCCCC' } },
            left:   { style: 'thin', color: { rgb: 'CCCCCC' } },
            right:  { style: 'thin', color: { rgb: 'CCCCCC' } }
        }
    };

    var ws = {};
    var range = { s: { r: 0, c: 0 }, e: { r: rawData.length, c: headers.length - 1 } };

    // Intestazioni riga 0
    headers.forEach(function(h, c) {
        var addr = XLSX.utils.encode_cell({ r: 0, c: c });
        ws[addr] = { v: h, t: 's', s: thStyle };
    });

    // Righe dati
    rawData.forEach(function(r, rowIdx) {
        var impiva = (r.imponibile || 0) + (r.inarcassa || 0);
        var indirizzo = clifoMap[r.clifoId] || (r.alias !== '' ? r.alias : (r.cliente || ''));

        var cells = [
            { v: r.imponibile    || 0,   t: 'n', s: numStyle },
            { v: r.inarcassa     || 0,   t: 'n', s: numStyle },
            { v: impiva,                 t: 'n', s: numStyle },
            { v: r.iva           || 0,   t: 'n', s: numStyle },
            { v: impiva + (r.iva || 0),  t: 'n', s: numStyle },
            { v: r.imponibile    || 0,   t: 'n', s: numStyle },
            { v: r.ritenuta      || 0,   t: 'n', s: numStyle },
            { v: r.splitpay      || 0,   t: 'n', s: numStyle },
            { v: r.totalePagare  || 0,   t: 'n', s: numStyle },
            { v: r.numeroFattura || '',  t: 's', s: txtStyle },
            { v: r.dataFattura ? moment(r.dataFattura).format('DD/MM/YYYY') : '', t: 's', s: txtStyle },
            { v: indirizzo,              t: 's', s: wrapStyle },
            { v: r.commessa      || '',  t: 's', s: wrapStyle },
            { v: r.importoPagato || 0,   t: 'n', s: numStyle }
        ];

        cells.forEach(function(cell, c) {
            var addr = XLSX.utils.encode_cell({ r: rowIdx + 1, c: c });
            ws[addr] = cell;
        });
    });

    ws['!ref'] = XLSX.utils.encode_range(range);
    ws['!cols'] = [
    {wch:12},{wch:10},{wch:12},{wch:10},{wch:12},
    {wch:12},{wch:10},{wch:10},{wch:12},{wch:18},
    {wch:14},{wch:40},{wch:30},{wch:14}
];

    var rowHeights = [{ hpt: 20 }];
    rawData.forEach(function(r) {
        var indirizzo = clifoMap[r.clifoId] || '';
        var righe = (indirizzo.match(/\|/g) || []).length + 1;
        rowHeights.push({ hpt: righe * 15 });
    });
    ws['!rows'] = rowHeights;

    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Fatture');

    var today = new Date();
    var y = today.getFullYear();
    var m = ('0'+(today.getMonth()+1)).slice(-2);
    var d = ('0'+today.getDate()).slice(-2);
    XLSX.writeFile(wb, 'esportazione_FATT' + y + '_' + m + d + '.xlsx');
}
