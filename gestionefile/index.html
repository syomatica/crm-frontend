<script>
    idGlobale = localStorage.getItem("idGlobale");
    idClifo = localStorage.getItem("idClifo");
    idAddetto = localStorage.getItem("addetto");

    $(document).ready(function () {
        var cartella = "";
        $('#naviga').select2({
            placeholder: "Naviga cartelle",
        });
        $('#naviga').select2().on("change", function () {
            $('#elencoFile').empty();
            caricalista($('#naviga').val());
        });

        var creaAlbero = $.getJSON(server + 'file/creaalbero?idGlobale=' + idGlobale + '&idClifo=' + idClifo + '&addetto=' + idAddetto);

        creaAlbero.error(function (r) {
            swal({
                title: '',
                type: 'error',
                text: JSON.parse(r.responseText).ERROR,
                allowEscapeKey: false,
                allowOutsideClick: false,
            });
        });

        creaAlbero.success(function () {
            caricalista($('#naviga').val());
        });

    });

    function caricalista(cartella) {
        var elencofile = $.getJSON(server + 'file/elencofile?idGlobale=' + idGlobale + '&cartella=' + cartella + '&idClifo=' + idClifo + '&addetto=' + idAddetto);
        elencofile.success(function (response) {
            var elenco = "";
            var folders = response[Object.keys(response)[0]];
            var length = folders.length;
            for (i = 0; i < length; i++) {
                elenco += '<tr style="cursor: pointer; cursor: hand;"><td>' + folders[i].nome + '</td><td></td><td><button class="btn btn-block btn-danger"  onclick="javascript:deleteF(\'' + folders[i].nome + '\')">Elimina</button></td><td><button type="button" class="btn btn-block btn-primary"  onclick="javascript:download(\'' + folders[i].nome + '\')">Scarica</button></td></tr>';
            }
            $('#elencoFile').append(elenco);
        }).error(function (r) {
            swal({
                title: '',
                type: 'error',
                text: JSON.parse(r.responseText).ERROR,
                allowEscapeKey: false,
                allowOutsideClick: false,
            });
        });
    }

    function deleteF(nome) {
        var cartella = $('#naviga').val();
        var deletef = $.getJSON(server + 'file/deletefile?idGlobale=' + idGlobale + '&fileName=' + nome + '&cartella=' + cartella + '&idClifo=' + idClifo);
        deletef.success(function () {
            $('#elencoFile').empty();
            caricalista($('#naviga').val());
        });

        deletef.error(function(r){
            swal({
                title: '',
                type: 'error',
                text: JSON.parse(r.responseText).ERROR,
                allowEscapeKey: false,
                allowOutsideClick: false,
            });
        });
    }
    function download(nome) {
        var cartella = $('#naviga').val();
        //$.fileDownload(server+'file/downloadfile?idGlobale='+idGlobale+'&fileName='+nome+'&cartella='+cartella+'&idClifo='+idClifo);
        window.open(server + 'file/downloadfile?idGlobale=' + idGlobale + '&fileName=' + nome + '&cartella=' + cartella + '&idClifo=' + idClifo);
    }
</script>

                                        url: server + 'file/uploadFile?idGlobale=' + idGlobale + '&cartella=' + $('#naviga').val() + '&idClifo=' + idClifo;

                                        var uploaderConfig = {

                                            name: 'file',

                                            customHeaders: {'token': sessionStorage.getItem('token')},
                                            multiple: true,
                                            multipart: true,
                                            maxUploads: 1,
                                            queue: false,
                                            debug: true,
                                            hoverClass: 'btn-hover',
                                            focusClass: 'active',
                                            disabledClass: 'disabled',
                                            onSubmit: function (filename, ext) {
                                                var prog = document.createElement('div'),
                                                        outer = document.createElement('div'),
                                                        bar = document.createElement('div'),
                                                        size = document.createElement('div'),
                                                        self = this;

                                                prog.className = 'prog';
                                                size.className = 'size';
                                                outer.className = 'progress progress-striped';
                                                bar.className = 'progress-bar progress-bar-success';

                                                outer.appendChild(bar);
                                                prog.appendChild(size);
                                                prog.appendChild(outer);
                                                wrap.appendChild(prog); // 'wrap' is an element on the page

                                                self.setProgressBar(bar);
                                                self.setProgressContainer(prog);
                                                self.setFileSizeBox(size);

                                                errBox.innerHTML = '';
                                                btn.value = 'Scegli un altro file';
                                            },
                                            onSizeError: function () {
                                                errBox.innerHTML = 'Massimo 50 MB';
                                            },
                                            onComplete: function (file, response, btn) {
                                                $('#elencoFile').empty();
                                                caricalista($('#naviga').val());
                                            }
                                        };

                                        var uploader = new ss.SimpleUpload(uploaderConfig);

                                        $('#naviga').on('select2:select', function () {
