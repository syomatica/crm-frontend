<script>

    function isIE() {
        var myNav = navigator.userAgent.toLowerCase();
        return (myNav.indexOf('msie') != -1) ? parseInt(myNav.split('msie')[1]) : false;
    }

    if (isIE() && (isIE() < 9 || isIE() == 9)) {
        alert('Browser non supportato, Internet Explorer è supportato nelle versioni 10 o più');
    }

    

    
    $(document).ready(function () {
        $.ajaxSetup({
            // Disable caching of AJAX responses
            cache: false
        });
        sessionStorage.clear();

        $('.forgot-pass').click(function (event) {
            $(".pr-wrap").toggleClass("show-pass-reset");
        });

        $('.pass-reset-submit').click(function (event) {
            $(".pr-wrap").removeClass("show-pass-reset");
        });

        /*
        sessionStorage.setItem('token', '111');
        sessionStorage.setItem('nominativo', 'test');
        sessionStorage.setItem('admins', true);

        sessionStorage.setItem('idAddetto', 0);
        window.location.replace("home/");

        //var xyz = jQuery.url.param("pconnect_token");
        //alert(xyz);
        var url_string = window.location.href; // www.test.com?filename=test
        var url = new URL(url_string);
        var paramValue = url.searchParams.get("pconnect_token");
        if(paramValue){
            Pace.restart();
            var data = {
                username: 'pme',
                password: paramValue
            };
            var doLogin = $.ajax({
                type: 'post',
                url: server + 'session/login',
                data: JSON.stringify(data),
                dataType: "json",
                headers: {
                    "content-type": "application/json"
                }
            });

            doLogin.success(function (response) {
                sessionStorage.setItem('pme', true);
                sessionStorage.setItem('token', response.token);
                //sessionStorage.setItem('nominativo', response.nominativo);
                sessionStorage.setItem('nominativo', user);
                sessionStorage.setItem('admins', response.admins);
                sessionStorage.setItem('dirigenti', response.dirigenti);
                sessionStorage.setItem('dipendenti', response.dipendenti);
                sessionStorage.setItem('idAddetto', response.idAddetto);
                sessionStorage.setItem('vv', vv);
                sessionStorage.setItem('pme-format', response.pmeData.format);
                sessionStorage.setItem('pme-conf', response.pmeData.conf);
                sessionStorage.setItem('pme-resources', response.pmeData.resource);

                //gestione etichette pme
                /*
                getPmeLabels(){
                    if(this.pmeFormat==null){
                        if(sessionStorage.getItem("pmeFormat")!=null){
                            this.pmeFormat = JSON.parse(sessionStorage.getItem("pmeFormat")!);
                        }
                    }
                    return this.pmeFormat?.labels ?? {};
                }

                getPmeLang(){

                //window.location.replace("gestionepreventivi/");

                swal({
                    title : '',
                    type : 'error',
                    text : JSON.parse(r.responseText).ERROR,
                    allowEscapeKey : false,
                    allowOutsideClick : false,
                });
            });
        }else{
            $("#panel_login").show();
            sessionStorage.setItem('pme', false);
        }
        

    });


    $('#login').click(function (e) {
        e.preventDefault();
        var user = $('#user').val();
        use = user;
        var pwd = $('#pwd').val();
        if (user && pwd) {
            Pace.restart();
            var data = {
                username: user,
                password: pwd
            };
            var doLogin = $.ajax({
                type: 'post',
                url: server + 'session/login',
                data: JSON.stringify(data),
                dataType: "json",
                headers: {
                    "content-type": "application/json"
                }
            });

            doLogin.success(function (response) {

                sessionStorage.setItem('token', response.token);
                //sessionStorage.setItem('nominativo', response.nominativo);
                sessionStorage.setItem('nominativo', user);
                sessionStorage.setItem('admins', response.admins);
                sessionStorage.setItem('dirigenti', response.dirigenti);
                sessionStorage.setItem('dipendenti', response.dipendenti);
                sessionStorage.setItem('idAddetto', response.idAddetto);
                sessionStorage.setItem('vv', vv);

                /*
                var richiestaParametri = $.ajax({
                    type: 'get',
                    url: server + 'secure/preventivi/parametri/elenco',
                    dataType: "json",
                    headers: {
                        "token": response.token
                    }
                });


                richiestaParametri.success(function (data) {
                    sessionStorage.setItem('parametri', JSON.stringify(data));
                    window.location.replace("gestionepreventivi/");
                });
                */
                window.location.replace("gestionepreventivi/");

            }).error(function(r){
                swal({
                    title : '',
                    type : 'error',
                    text : JSON.parse(r.responseText).ERROR,
                    allowEscapeKey : false,
                    allowOutsideClick : false,
                });
            });

                text: '<b>Completa tutti i campi</b>',
                type: 'warning',
                layout: 'topCenter',
                timeout: 2000,
                animation: {
                    open: 'animated flipInX',
                    close: 'animated flipOutX',
                    easing: 'swing',
                    speed: 500
                }
            });
        }
    });
