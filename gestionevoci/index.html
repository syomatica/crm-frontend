<script>

var idVoce = null;
var umList = [];
var ivaList = [];

function initSelects(){
  $('#um').select2({ placeholder: 'Seleziona UM', allowClear: true, width: '100%' });
  $('#iva').select2({ placeholder: 'Seleziona IVA', allowClear: true, width: '100%' });
}

function loadLookups() {
  //var d1 = $.getJSON(server + 'secure/um/elenco');
  var d1 = [
    {code: 'nr', descrizione: 'Nr.'},
    {code: 'pz', descrizione: 'pezzi'},
    {code: 'qt', descrizione: 'qtà'},
    {code: 'kg', descrizione: 'chilogrammi'},
    {code: 'lt', descrizione: 'litri'},
    {code: 'm', descrizione: 'metri'},
    {code: 'g', descrizione: 'giorni'},
    {code: 'y', descrizione: 'anni'},
    {code: 'h', descrizione: 'ore'}
  ];
  fillSelect('#um', d1, 'code', 'descrizione');

  //var d2 = $.getJSON(server + 'secure/iva/elenco');
  var d2 = [
    {code: '22', descrizione: '22%'},
    {code: '10', descrizione: '10%'},
    {code: '4', descrizione: '4%'},
    {code: 'ES', descrizione: 'Esente'}
  ];
  fillSelect('#iva', d2, 'code', 'descrizione');

  /*
  return $.when(d1, d2).done(function(r1, r2){
    // jQuery when: r1[0] è il body
    umList = r1[0] || [];
    ivaList = r2[0] || [];

    fillSelect('#um', umList, 'code', 'descrizione');   // adatta le key se diverse
    fillSelect('#iva', ivaList, 'code', 'descrizione'); // adatta le key se diverse
  });
  */
}

function fillSelect(sel, arr, keyId, keyText) {
  var $s = $(sel);
  $s.empty();
  $s.append('<option></option>'); // per allowClear

  for (var i=0;i<arr.length;i++){
    var id = arr[i][keyId];
    var text = arr[i][keyText];
    $s.append('<option value="'+ escapeHtml(String(id)) +'">'+ escapeHtml(String(text)) +'</option>');
  }
  $s.trigger('change');
}

function escapeHtml(str){
  return str.replace(/[&<>"']/g, function(m){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);
  });
}

function normalizePriceInput(val){
  if (val == null) return null;
  val = String(val).trim();
  if (!val) return null;

  // accetta 12,34 o 12.34
  val = val.replace(',', '.');

  // lascia solo numeri e punto
  val = val.replace(/[^0-9.]/g, '');

  // evita più punti
  var parts = val.split('.');
  if (parts.length > 2) {
    val = parts[0] + '.' + parts.slice(1).join('');
  }

  var n = Number(val);
  if (isNaN(n)) return null;

  // max 2 decimali
  return Math.round(n * 100) / 100;
}

$('#prezzou').on('blur', function(){
  var n = normalizePriceInput($(this).val());
  $(this).val(n == null ? '' : n.toFixed(2));
});

$( document ).ready(function() {

    initSelects();

    loadLookups();
    refresh();
    /*
    loadLookups().always(function(){
        refresh(); // parte dopo (o anche se errore, con select vuote)
    });
    */

    $('#pulisci').on('click', function() {
        $("#voce, #descrizione").val(null);
        $('#descrizione').css("background-color", "");
        
        $('#inserisci').addClass('disabled');
        
    });

    
    
    $('#modifica, #elimina').hide();
    $('input, select').prop('disabled',true);
    $('textarea').prop('disabled',true);
  
});

function refresh() {
    //$('#Esistenti').html('<tr><th>Voce</th><th>Descrizione</th><th>UM</th><th>IVA</th><th>Prezzo</th></tr>');
    $('#Esistenti').html('');
    var elenco = $.getJSON(server + 'secure/voci/elenco');
    
    elenco.done(function(response) {
        for (i = 0; i < response.length; i++) {
            if(response[i].tipo=='V'){
                //$('#Esistenti').append('<tr style="cursor: pointer; cursor: hand;" onclick="mostra('+response[i].id+')"><td>'+ response[i].voce +'</td><td>'+ response[i].descrizione +'</td><td>'+ (response[i].um ?? '') +'</td><td>'+ (response[i].iva ?? '') +'</td><td>'+ (response[i].prezzou ?? '') +'</td></tr>');                    		
                $('#Esistenti').append(
                    '<tr style="cursor:pointer" onclick="mostra('+response[i].id+')">'
                    + '<td>'+ response[i].voce +'</td>'
                    + '<td>'+ response[i].descrizione +'</td>'
                    + '<td>'+ (response[i].um || '') +'</td>'
                    + '<td>'+ (response[i].iva || '') +'</td>'
                    + '<td style="text-align:right;">'+ (response[i].prezzou != null ? Number(response[i].prezzou).toFixed(2) : '') +'</td>'
                    + '</tr>'
                );
            }
        }
        Waves.attach('.btn',['waves-float','waves-block']);
        Waves.init();
    })
}
function aggiungi(){
    annullamodifica();
    $('#form').addClass('animated pulse');
    $('#boxregistrati').block({message: null});
    $('#inserimentoMode').removeClass('hidden');
    $('input, select').prop('disabled',false);
    $('textarea').prop('disabled',false);
    
    $('#descrizione').removeClass("bg-yellow") ;
    resetSchedaicon();
    $('#scheda-icon').addClass("fa fa-plus-square") ;
    
}
function annullamodifica() {
    idVoce = null;

    $('#formtitolo').text('Dettagli');
    $('#modificaMode').addClass('hidden');
    $('#inserimentoMode').addClass('hidden');
    $('#form').removeClass('box-danger animated pulse');
    $('#form').addClass('box-success');
    $('#inserisci').text('Salva');
    $('#inserisci').show();
    $('#inserisci').addClass('disabled');
    $('input, select').prop('disabled',true);
    $('textarea').prop('disabled',true);
    $('#modifica,#elimina').hide();
    $('#descrizione').removeClass("bg-yellow") ;
    resetSchedaicon();
    $('#scheda-icon').addClass("fa fa-eye") ;
    $('#pulisci').click();
    $('#boxregistrati').unblock({message: null});
}
function resetSchedaicon(){
    $('#scheda-icon').removeClass("fa fa-plus-square") ;
    $('#scheda-icon').removeClass("fa fa-eye");
    $('#scheda-icon').removeClass("fa fa-edit");
}
function mostra(id){
    idVoce = id;
    $('input, select').prop('disabled',true);
    $('textarea').prop('disabled',true);
    $('#modifica').show();

    $('#inserisci').hide();

    var getVoce = $.getJSON(server + 'secure/voci/leggi', {
        id : idVoce
    });

    getVoce.done(function(response) {
        $('#voce').val(response.voce);
        $('#descrizione').val(response.descrizione);

        // UM e IVA: metto value (se null -> svuota)
        $('#um').val(response.um || null).trigger('change');
        $('#iva').val(response.iva || null).trigger('change');

        // prezzo
        var p = response.prezzou;
        $('#prezzou').val(p == null ? '' : Number(p).toFixed(2));

        $('#elimina').show();
        $('#inserisci').removeClass('disabled');
    });

}
function modifica() {
    refresh();
    $('#formtitolo').text('Modifica categoria');
    $('#modificaMode').removeClass('hidden');
    $('#form').removeClass('box-default');
    $('#form').addClass('box-danger animated pulse');
    $('#inserisci').text('Salva modifiche');
    $('#inserisci').show();
    $('input, select').prop('disabled',false);
    $('textarea').prop('disabled',false);
    $('#modifica,#elimina').hide();
    $('#voce').attr("disabled", true);
    resetSchedaicon();
    $('#scheda-icon').addClass("fa fa-edit");


    $('html, body').animate({
        scrollTop : 0
    }, 'fast');


    $('#boxregistrati').block({message: null});


}
function elimina() {
    swal({
        title : "Attenzione!",
        text : "L'elemento sarà eliminato definitivamente.",
        type : 'warning',
        confirmButtonText : "Elimina",
        cancelButtonText : "Annulla",
        showCancelButton : true,
        closeOnConfirm : false,
        showLoaderOnConfirm : true,
    }, function() {
        var elimina = $.get(server + 'secure/voci/cancella?id='+idVoce);
        
        elimina.success(function() {
            if (!errore) {
                swal("Eliminata", "", "success");
                annullamodifica();
                refresh();
            }
            errore = false;
        });
            elimina.error(function(){
            swal("Attenzione", "non è possibile eliminare questo elemento", "error");
            annullamodifica();
                refresh();
                errore = false;
        });
    });          
}
$('#inserisci').on('click', function(e) {
    if (!idVoce) {

        var datiIns = {
            tipo: 'V',
            voce: $('#voce').val(),
            descrizione: $('#descrizione').val(),
            um: $('#um').val() || null,
            iva: $('#iva').val() || null,
            prezzou: normalizePriceInput($('#prezzou').val())
        };


        var inserisci = $.post(server + 'secure/voci/inserisci',JSON.stringify(datiIns));
            
            
        inserisci.success(function() {
        
            if (!errore) {
                swal("Inserita", "", "success");
                annullamodifica();
                refresh();
                
            }
            errore = false;
        });
            inserisci.error(function(xhr){
                var msg = "Errore sconosciuto";
                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.ERROR) msg = resp.ERROR;
                } catch(e) {}

                swal("Errore", msg, "error");
                annullamodifica();
                errore = false;
                refresh();
            });
    } else {
        var dati = {
            id: idVoce,
            tipo: 'V',
            voce: $('#voce').val(),
            descrizione: $('#descrizione').val(),
            um: $('#um').val() || null,
            iva: $('#iva').val() || null,
            prezzou: normalizePriceInput($('#prezzou').val())
        };

        
        var modifica = $.post(server + 'secure/voci/modifica',JSON.stringify(dati));

        modifica.success(function() {
            errore = false;
            if (!errore) {
                swal("aggiornato", "", "success");
                annullamodifica();
                refresh();
            }
            
            $('#descrizione').removeClass("bg-yellow") ;
        });
    }
    
    resetSchedaicon();
    $('#scheda-icon').addClass("fa fa-eye") ;
});
$('#voce, #descrizione, #um, #iva, #prezzou').bind('keyup change ifChanged', function() {
    if ($('#voce').val().trim() != "" && $('#descrizione').val().trim()  != "")
        $('#inserisci').removeClass('disabled');
    else
        $('#inserisci').addClass('disabled');
});
