function escapeHtml(value) {
  return $('<div>').text(value == null ? '' : value).html();
}

function getPmeConfObject() {
  try {
    var confRaw = sessionStorage.getItem('pme-conf');
    if (!confRaw) return {};
    var parsed = JSON.parse(confRaw);
    if (typeof parsed === 'string') {
      parsed = JSON.parse(parsed);
    }
    return parsed || {};
  } catch (err) {
    console.error('Errore parsing pme-conf', err);
    return {};
  }
}

function getPmeFieldDataArray(fieldName) {
  var conf = getPmeConfObject();
  if (!conf || !Array.isArray(conf.fields)) return [];
  var field = conf.fields.find(function (item) {
    return item && item.field === fieldName;
  });
  if (!field) return [];
  return (Array.isArray(field.dataArray) ? field.dataArray.slice(0) : []).filter(function (item) {
    return item !== null && item !== undefined;
  });
}

function buildOptionsHtml(items, includeEmpty) {
  var html = includeEmpty ? '<option value=""></option>' : '';
  items.forEach(function (item) {
    html += '<option value="' + escapeHtml(item) + '">' + escapeHtml(item) + '</option>';
  });
  return html;
}

function initSettoriCombos() {
  $('#settoreEnte').html(buildOptionsHtml(getPmeFieldDataArray('ENTI'), true));
  $('#settoreNorma').html(buildOptionsHtml(getPmeFieldDataArray('NORMA'), true));

    if (!$('#settoreEnte').hasClass('select2-hidden-accessible')) {
        $('#settoreEnte').select2({
            multiple: false,
            placeholder: 'Seleziona un Ente',
            width: '100%',
            dropdownParent: $('#modalNuovoSettore'),
            allowClear: true
        });
    }

    if (!$('#settoreNorma').hasClass('select2-hidden-accessible')) {
        $('#settoreNorma').select2({
            multiple: false,
            placeholder: 'Seleziona una Norma',
            width: '100%',
            dropdownParent: $('#modalNuovoSettore'),
            allowClear: true
        });
    }
}

function initPartnerCombo() {
  $('#partner').html(buildOptionsHtml(getPmeFieldDataArray('PARTNER'), true));

  if (!$('#partner').hasClass('select2-hidden-accessible')) {
    $('#partner').select2({
      multiple: false,
      placeholder: 'Seleziona un Partner',
      width: '100%',
      allowClear: true
    });
  }
}

function clearSettoreForm() {
  initSettoriCombos();
  $('#settoreSettori').val('');
  $('#settoreScopoIta').val('');
  $('#settoreScopoEng').val('');
  $('#erroreSettoreModal').hide().text('');
  $('#settoreEnte').val(null).trigger('change');
  $('#settoreNorma').val(null).trigger('change');
}

function updateSettoriUiState() {
  if (_idClifo < 0) {
    $('#btnNuovoSettore').prop('disabled', true);
    $('#settoriHint').text('Salvare prima l’anagrafica cliente per poter gestire i settori.');
  } else {

function parseJsonSafely(value) {
  if (value == null) return null;

  if (typeof value === 'object') {
    return value;
  }

  if (typeof value !== 'string') {
    return null;
  }

  var trimmed = value.trim();
  if (!trimmed) return null;

  try {
    var parsed = JSON.parse(trimmed);

    // caso stringa json doppiamente serializzata
    if (typeof parsed === 'string') {
      try {
        parsed = JSON.parse(parsed);
      } catch (e2) {}
    }

    return parsed;
  } catch (e) {
    console.error('Errore parsing JSON', e, value);
    return null;
  }
}

function extractSettoriFromPmeObject(pmeObjectRaw) {
  var pmeObject = parseJsonSafely(pmeObjectRaw);
  if (!pmeObject || !Array.isArray(pmeObject.equipments)) {
    return [];
  }

  return pmeObject.equipments.map(function (equipment) {
    var fields = equipment && equipment.fields ? equipment.fields : {};

    return {
      ente: fields.ENTI || equipment.ente || equipment.ENTE || '',
      norma: fields.NORMA || equipment.norma || equipment.NORMA || '',
      settori: fields.SETTORI || equipment.settori || equipment.SETTORI || '',
      scopoIta: fields.SCOPO1 || equipment.scopoIta || equipment.scopoITA || equipment.SCOPO1 || '',
      scopoEng: fields.SCOPO || equipment.scopoEng || equipment.scopoENG || equipment.SCOPO || ''
    };
  });
}

function getSettoreValue(item, keys) {
  if (!item) return '';
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    if (item[key] !== undefined && item[key] !== null) return item[key];
  }
  return '';
}

function renderSettoriTable(list) {
  var $tbody = $('#tabSettoriCliente tbody');
  $tbody.empty();

  if (!list || !list.length) {
    $tbody.html('<tr><td colspan="5" class="text-center text-muted">Nessun settore disponibile.</td></tr>');
    return;
  }

  list.forEach(function (item) {
    var ente = getSettoreValue(item, ['ente', 'ENTE']);
    var norma = getSettoreValue(item, ['norma', 'NORMA']);
    var settori = getSettoreValue(item, ['settori', 'SETTORI']);
    var scopoIta = getSettoreValue(item, ['scopoIta', 'scopoITA', 'scopo1', 'SCOPO1']);
    var scopoEng = getSettoreValue(item, ['scopoEng', 'scopoENG', 'scopo', 'SCOPO']);

    $tbody.append(
      '<tr>' +
        '<td>' + escapeHtml(ente) + '</td>' +
        '<td>' + escapeHtml(norma) + '</td>' +
        '<td>' + escapeHtml(settori) + '</td>' +
        '<td>' + escapeHtml(scopoIta).replace(/\n/g, '<br>') + '</td>' +
        '<td>' + escapeHtml(scopoEng).replace(/\n/g, '<br>') + '</td>' +
      '</tr>'
    );
  });
}

function loadSettoriCliente(forceReload) {
  updateSettoriUiState();

  if (_idClifo < 0) {
    renderSettoriTable([]);
    return;
  }

  if (!forceReload && currentClifoReadRow) {
    renderSettoriTable(extractSettoriFromPmeObject(currentClifoReadRow.pmeObject));
    return;
  }

  $.ajax({
    url: server + 'secure/cliforapido/readByKey?idClifo=' + encodeURIComponent(_idClifo),
    type: 'GET',
    success: function (response) {
      var row = (Array.isArray(response) && response.length) ? response[0] : null;
      currentClifoReadRow = row;
      renderSettoriTable(extractSettoriFromPmeObject(row ? row.pmeObject : null));
    },
    error: function () {
      $('#tabSettoriCliente tbody').html('<tr><td colspan="5" class="text-center text-danger">Errore nel caricamento dei settori.</td></tr>');
    }
  });
}

  var ente = $('#settoreEnte').val();

  var scopoEng = $('#settoreScopoEng').val().trim();

  var payload = {

    norma: norma,

        msg = parsed.ERROR || parsed.message || msg;
      } catch (e) {}
      $('#erroreSettoreModal').text(msg).show();
    }
  });
}

function getSavedClifoId(response, currentId) {
  if (currentId >= 0) return currentId;
  if (response == null) return currentId;

  if (typeof response === 'number' || typeof response === 'string') {
    return response;
  }

  var candidates = [
    response.id,
    response.idClifo,
    response.idCliFo,
    response.key,
    response.ID,
    response.IDCLIFO
  ];

  if (Array.isArray(response) && response.length) {
    candidates.push(response[0] && response[0].id);
    candidates.push(response[0] && response[0].idClifo);
    candidates.push(response[0] && response[0].idCliFo);
  }

  for (var i = 0; i < candidates.length; i++) {
    if (candidates[i] !== undefined && candidates[i] !== null && candidates[i] !== '') {
      return candidates[i];
    }
  }

  return currentId;
}

/**
 * Salva o aggiorna un CliFo.
 * – _idClifo = -1   inserimento
 * – _idClifo >= 0   modifica
 */
function salvaCli() {
    var tipo = $("#idTipoClifo").val();
    if(_idClifo<0){
      tipo = $("#idTipoClifo2").val();
    }
    const societa = $('#societa').val().trim();
    if (!societa) {
        $('#erroreSocieta').show();
        return;
    }
    $('#erroreSocieta').hide();

    //se cliente, verifica campi obbligatori
    if (tipo == 'CLIENTE') {
        const piva       = $('#piva').val();
        const pec        = $('#pec').val();
        const telematico = $('#telematico').val();
        const via        = $('#indirizzo').val();
        const citta      = $('#citta').val();
        const cap        = $('#cap').val();
        const provincia  = $('#provincia').val();

        if (!piva) {
            swal("Errore", "Partita IVA obbligatoria per i CLIENTI", "warning");
            return;
        }
        if (!pec && !telematico) {
            swal("Errore", "Inserire almeno PEC o Indirizzo Telematico", "warning");
            return;
        }
        if (!via || !citta || !cap || !provincia) {
            swal("Errore",
                 "Compilare l'indirizzo completo: via, città, CAP e provincia",
                 "warning");
            return;
        }
    }

    const data = {
      id: _idClifo,
      tipoCliFo: tipo,
      societa: societa,
      capoGruppo: $('#partner').val(),
      alias: $('#alias').val().trim(),
      via: $('#indirizzo').val(),
      cap: $('#cap').val(),
      citta: $('#citta').val(),
      provincia: $('#provincia').val(),
      nazione: $('#nazione').val(),
      titoloC: $('#titoloC').val(),
      nomeC: $('#nomeC').val(),
      cognomeC: $('#cognomeC').val(),
      cellulareC: $('#cellulareC').val(),
      emailC: $('#emailC').val(),
      telefono: $('#telefono').val(),
      fax: $('#fax').val(),
      noteInterne: $('#noteInterne').val(),
      pec:         $('#pec').val(),
      telematico:  $('#telematico').val(),
      piva:        $('#piva').val(),
      cfisc:       $('#cfisc').val()

    };


    var wasInsert = _idClifo < 0;

    $.ajax({
        url: server + 'secure/cliforapido/update',
        type: 'POST',
        contentType: 'application/json',
        // CS-272: header Authorization gestito globalmente da setupajax.js (sessionStorage token)
        data: JSON.stringify(data),

        success: function (response) {
            var savedId = getSavedClifoId(response, _idClifo);
            if (savedId !== undefined && savedId !== null && savedId !== '') {
              _idClifo = savedId;
            }

            noty({
                text:   wasInsert
                  ? tipo + ' inserito con successo'
                  : 'Modifiche salvate con successo',
                layout: 'topCenter',
                type:   'success',
                killer: true,
                timeout: 2000,
                animation: {
                    open:  'animated bounceInDown',
                    close: 'animated bounceOutUp',
                    speed: 500
                }
            });
            $("#btnOpenUpd").show();
            $('#btnEliminaCli').show();
            $("#btnSaveUpd").hide();
            $("#btnCancelUpd").hide();
            refreshClifo();
            if(_idClifo>=0){
              dettagliClifo(_idClifo);
            } else {
              updateSettoriUiState();
            }
        },

        error: function (xhr) {
            swal("Errore", "Errore nel salvataggio", "error");
        }
    });

}
